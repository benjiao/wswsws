# Test hooks - these steps test different git event hooks
steps:
  test-push-hook:
    image: alpine:latest
    when:
      - event: push
        branch: main
    commands:
      - echo "=== Push Hook Test ==="
      - echo "Push hook triggered on main branch"
      - echo "Commit: ${CI_COMMIT_SHA}"
      - echo "Branch: ${CI_COMMIT_BRANCH}"
      - echo "Author: ${CI_COMMIT_AUTHOR}"
      - echo "Message: ${CI_COMMIT_MESSAGE}"

  # Always run step to ensure pipeline is found
  always-run:
    image: alpine:latest
    commands:
      - echo "Pipeline is running"
      - echo "Event: ${CI_BUILD_EVENT}"
      - echo "Branch: ${CI_COMMIT_BRANCH}"
