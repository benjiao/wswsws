when:
  - event: push
    branch: main
steps:
  - name: build-and-push-api
    image: woodpeckerci/plugin-docker-buildx:6
    privileged: true
    settings:
      context: api
      dockerfile: api/Dockerfile
      platforms: linux/arm64
      repo: registry.benjiao.net/wswsws/api
      tags:
        - latest
        - ${WOODPECKER_COMMIT_SHA}
  
  - name: build-and-push-web
    image: woodpeckerci/plugin-docker-buildx:6
    privileged: true
    settings:
      context: web
      dockerfile: web/Dockerfile
      platforms: linux/arm64
      repo: registry.benjiao.net/wswsws/web
      tags:
        - latest
        - ${WOODPECKER_COMMIT_SHA}

  - name: notify
    image: woodpeckerci/plugin-webhook
    depends_on:
      - build-and-push-api
      - build-and-push-web
    settings:
      urls:
        - "${WEBHOOK_URL}"
      method: POST
      content_type: application/json
      template: |
        {
          "repo": "{{repo.full_name}}",
        }
    when:
      status: [ success, failure ]
