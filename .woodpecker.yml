# Test hooks - these steps test different git event hooks
steps:
  test-push-hook:
    image: alpine:latest
    when:
      event: push
      branch: main
    commands:
      - echo "=== Push Hook Test ==="
      - echo "Push hook triggered on main branch"
      - echo "Commit: ${CI_COMMIT_SHA}"
      - echo "Branch: ${CI_COMMIT_BRANCH}"
      - echo "Author: ${CI_COMMIT_AUTHOR}"
      - echo "Message: ${CI_COMMIT_MESSAGE}"

  test-pr-hook:
    image: alpine:latest
    when:
      event: pull_request
    commands:
      - echo "=== Pull Request Hook Test ==="
      - echo "Pull request hook triggered"
      - echo "PR Number: ${CI_COMMIT_PULL_REQUEST}"
      - echo "Source: ${CI_COMMIT_SOURCE_BRANCH}"
      - echo "Target: ${CI_COMMIT_TARGET_BRANCH}"
      - echo "Commit: ${CI_COMMIT_SHA}"

  test-tag-hook:
    image: alpine:latest
    when:
      event: tag
    commands:
      - echo "=== Tag Hook Test ==="
      - echo "Tag hook triggered"
      - echo "Tag: ${CI_COMMIT_TAG}"
      - echo "Ref: ${CI_COMMIT_REF}"
      - echo "Commit: ${CI_COMMIT_SHA}"

  test-deployment-hook:
    image: alpine:latest
    when:
      event: deployment
    commands:
      - echo "=== Deployment Hook Test ==="
      - echo "Deployment hook triggered"
      - echo "Environment: ${CI_DEPLOY_TARGET}"
      - echo "Commit: ${CI_COMMIT_SHA}"

  # Test hook for push to any branch
  test-push-any-branch-hook:
    image: alpine:latest
    when:
      event: push
    commands:
      - echo "=== Push Any Branch Hook Test ==="
      - echo "Push detected on branch: ${CI_COMMIT_BRANCH}"
      - echo "Commit: ${CI_COMMIT_SHA}"
      - echo "This hook triggers on any push event"

  # Main pipeline steps
  lint-api:
    image: python:3.11-slim
    when:
      - event: push
      - event: pull_request
    commands:
      - echo "Linting API code..."
      - cd api
      - pip install flake8 || true
      - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - echo "API lint check completed"

  lint-web:
    image: node:20-slim
    when:
      - event: push
      - event: pull_request
    commands:
      - echo "Linting Web code..."
      - cd web
      - npm install -g yarn || true
      - yarn install --frozen-lockfile || true
      - yarn lint || true
      - echo "Web lint check completed"

  test-api:
    image: python:3.11-slim
    when:
      - event: push
      - event: pull_request
    commands:
      - echo "Running API tests..."
      - cd api
      - pip install -r requirements.txt || true
      - python manage.py test --noinput || echo "Tests completed with warnings"
      - echo "API tests completed"

  build-api:
    image: docker:latest
    when:
      - event: push
        branch: main
      - event: tag
    services:
      - docker:dind
    commands:
      - echo "Building API Docker image..."
      - cd api
      - docker build -t test-api:${CI_COMMIT_SHA} .
      - echo "API image built successfully"

  build-web:
    image: docker:latest
    when:
      - event: push
        branch: main
      - event: tag
    services:
      - docker:dind
    commands:
      - echo "Building Web Docker image..."
      - cd web
      - docker build -t test-web:${CI_COMMIT_SHA} .
      - echo "Web image built successfully"

  notify:
    image: alpine/curl:latest
    when:
      - status: success
      - status: failure
    commands:
      - echo "Pipeline ${CI_BUILD_STATUS} for commit ${CI_COMMIT_SHA}"
      - echo "Hook test completed"
