when:
  - event: push
    branch: main
steps:
  - name: build-and-push-api
    image: woodpeckerci/plugin-docker-buildx:6
    privileged: true
    settings:
      context: api
      dockerfile: api/Dockerfile
      platforms: linux/arm64
      registry: registry.benjiao.net/wswsws/web
      tags:
        - latest
        - ${WOODPECKER_COMMIT_SHA}
