services:
  api:
    build: api/
    command: bash -c "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env.default
      - .env
    restart: unless-stopped
  db:
    image: postgres:latest
    env_file:
      - .env.default
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    build: api/
    command: python manage.py migrate --noinput
    depends_on:
      - db
      - api
    env_file:
      - .env.default
      - .env

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    env_file:
      - .env.default
      - .env
    volumes:
      - ./web:/app
      - /app/node_modules  # Anonymous volume for node_modules
      - /app/.next         # Anonymous volume for .next build cache
    restart: unless-stopped

  redis:
    image: redis:latest
    restart: unless-stopped

  celery-worker:
    build: api/
    command: celery -A api worker --loglevel=info --concurrency=1
    depends_on:
      - redis
      - db
    env_file:
      - .env.default
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A api status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  celery-beat:
    build: api/
    command: celery -A api beat --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env.default
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A api status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

