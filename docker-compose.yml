services:
  api:
    image: registry.benjiao.net/wswsws/api:latest
    command: bash -c "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wswsws}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - SECRET_KEY=${SECRET_KEY:-fallback-secret-key}
      - DEBUG=${DEBUG:-True}
      - TIMEZONE=${TIMEZONE:-UTC}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - /mnt/wswsws_backups:/mnt/backups
    restart: unless-stopped
    networks:
      - wswsws_network

  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wswsws}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
      - /mnt/wswsws_backups:/mnt/backups
    restart: unless-stopped
    networks:
      - wswsws_network

  migrate:
    image: registry.benjiao.net/wswsws/api:latest
    command: python manage.py migrate --noinput
    depends_on:
      - db
      - api
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wswsws}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - SECRET_KEY=${SECRET_KEY:-fallback-secret-key}
      - DEBUG=${DEBUG:-True}
    networks:
      - wswsws_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=${NODE_ENV:-production}
    restart: unless-stopped
    networks:
      - wswsws_network

  redis:
    image: redis:latest
    restart: unless-stopped
    networks:
      - wswsws_network

  celery-worker:
    image: registry.benjiao.net/wswsws/api:latest
    command: celery -A api worker --loglevel=info --concurrency=1
    depends_on:
      - redis
      - db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wswsws}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - SECRET_KEY=${SECRET_KEY:-fallback-secret-key}
      - DEBUG=${DEBUG:-True}
      - TIMEZONE=${TIMEZONE:-UTC}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A api status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wswsws_network

  celery-beat:
    image: registry.benjiao.net/wswsws/api:latest
    command: celery -A api beat --loglevel=info
    depends_on:
      - redis
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wswsws}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - SECRET_KEY=${SECRET_KEY:-fallback-secret-key}
      - DEBUG=${DEBUG:-True}
      - TIMEZONE=${TIMEZONE:-UTC}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A api status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wswsws_network

volumes:
  postgres_data:
  backup_data:

networks:
  wswsws_network:
    driver: bridge
    external: false