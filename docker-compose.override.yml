services:
  api:
    volumes:
      - ./api:/app

  web:
    # Override for development with hot reload
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:8000
    command: npm run dev

  migrate:
    volumes:
      - ./api:/app
  celery-worker:
    volumes:
      - ./api:/app  # use override in prod as discussed
  celery-beat:
    volumes:
      - ./api:/app  # use override in prod as discussed