services:
  api:
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=${NODE_ENV:-development}
    restart: unless-stopped
    volumes:
      - ./web:/app
      - /app/node_modules


  migrate:
    volumes:
      - ./api:/app
  celery-worker:
    volumes:
      - ./api:/app  # use override in prod as discussed
  celery-beat:
    volumes:
      - ./api:/app  # use override in prod as discussed